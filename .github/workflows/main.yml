name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Trigger khi push lên branch main. Thay bằng branch của bạn nếu khác.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thunha2014  # Thay bằng username Docker Hub của bạn (ví dụ: mincow271104)
          password: ${{ secrets.DOCKER_HUB }}  # Tham chiếu secret bạn vừa thêm (nếu tên là DOCKER_HUB_TOKEN thì thay thành ${{ secrets.DOCKER_HUB_TOKEN }})

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .  # Thư mục chứa Dockerfile
          push: true
          tags: thunha2014/robottest:latest  # Thay bằng tên image của bạn, ví dụ: mincow271104/testimage:lates        - name: Triển khai lên DevOps Classroom
        run: |
          REPO="repository/docker"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
